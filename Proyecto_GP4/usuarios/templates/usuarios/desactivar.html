{% extends 'main.html' %}

{% block Contenido %}
<form method="post" action=".">
    <div class="card shadow-sm">
        <div class="card-header bg-danger text-white">
            <h3 class="card-title" style="margin: 0;">
                <i class="fas fa-trash"></i> {{ titulo }}
            </h3>
        </div>
        <div class="card-body">
            {% csrf_token %}
            <div class="alert alert-danger mb-0">
                <h5><i class="fas fa-exclamation-triangle"></i> Advertencia!</h5>
                <p class="mb-0">
                    ¿Estás seguro que deseas desactivar al usuario 
                    <strong>{{ object.username }}</strong> 
                    ({{ object.first_name }} {{ object.last_name }})?
                </p>
            </div>
        </div>
        <div class="card-footer text-right">
            <a href="{{ listar_url }}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-danger">
                <i class="fas fa-user-slash"></i> Sí, Desactivar
            </button>
        </div>
    </div>
</form>
{% endblock %}
