{% extends 'main.html' %}
{% load widget_tweaks %}

{% block Contenido %}

<form method="post" action="." id="form-venta">
  {% csrf_token %}

  <div class="card shadow-sm">
    <div class="card-header bg-success text-white">
      <h3 class="card-title" style="margin:0;">
        <i class="{{ icono }}"></i> {{ titulo }}
      </h3>
    </div>

    <div class="card-body">

      <div class="form-group">
        <label><strong>Selecciona un Pedido:</strong></label>
        <select name="pedido" class="form-control" id="select-pedido" required>
          <option value="">— Seleccione un pedido —</option>
          {% for pedido in form.fields.pedido.queryset %}
            {% if pedido.venta_set.exists %}
              <!-- Pedido ya tiene venta: subrayado y deshabilitado -->
              <option value="{{ pedido.pk }}" disabled
                style="text-decoration: line-through; color: #aaa; background:#f0f0f0;">
                 Pedido #{{ pedido.id_pedido }} — Mesa {{ pedido.mesa.numero_mesa }} — ${{ pedido.total }} — {{ pedido.estado }} (Ya tiene venta)
              </option>
            {% else %}
              <!-- Pedido disponible -->
              <option value="{{ pedido.pk }}"
                style="{% if pedido.estado != 'Entregado' %}color: #e67e22;{% endif %}">
                Pedido #{{ pedido.id_pedido }} — Mesa {{ pedido.mesa.numero_mesa }} — ${{ pedido.total }} — {{ pedido.estado }}
              </option>
            {% endif %}
          {% endfor %}
        </select>
        <small class="text-muted">
            Tachados = ya tienen venta y no se pueden hacer otra &nbsp;|&nbsp; <br>
          #Color naranja = aun esta en preparacion (no se pueden hacer la venta aun...)
        </small>
      </div>

      <!-- INFO DEL PEDIDO SELECCIONADO -->
      <div id="info-pedido" style="display:none; margin-top:15px;">
        <div class="alert alert-info">
          <i class="fas fa-info-circle"></i>
          <strong>Pedido seleccionado:</strong>
          <span id="texto-pedido"></span>
        </div>
      </div>

    </div>

    <div class="card-footer text-right">
      <button type="submit" class="btn btn-success btn-xs">
        <i class="fas fa-save"></i> Guardar Venta
      </button>
      <a href="{% url 'app:listar_ventas' %}" class="btn btn-danger btn-xs">
        <i class="fas fa-times"></i> Cancelar
      </a>
    </div>

  </div>

</form>

<script>
  //este script es para mejorar lo visual de crear venta.
  const select = document.getElementById('select-pedido');
  const infoPedido = document.getElementById('info-pedido');
  const textoPedido = document.getElementById('texto-pedido');

  select.addEventListener('change', function() {
    if (this.value) {
      const texto = this.options[this.selectedIndex].text;
      textoPedido.textContent = texto;
      infoPedido.style.display = 'block';
    } else {
      infoPedido.style.display = 'none';
    }
  });

  // Alerta de error si hay errores del form
  {% if form.errors %}
  Swal.fire({
    icon: 'error',
    title: 'Error',
    text: 'Verifica los campos del formulario.',
    confirmButtonColor: '#e53935',
    confirmButtonText: 'Entendido'
  });
  {% endif %}

  // Alertas de messages para crear ventas
  {% if messages %}
    {% for message in messages %}
    Swal.fire({
      icon: '{% if message.tags == "success" %}success{% elif message.tags == "error" %}error{% elif message.tags == "warning" %}warning{% else %}info{% endif %}',
      title: '{% if message.tags == "success" %}Éxito{% elif message.tags == "error" %}❌ Error{% elif message.tags == "warning" %}⚠️ Advertencia{% else %}ℹ️ Info{% endif %}',
      text: '{{ message }}',
      confirmButtonColor: '{% if message.tags == "success" %}#43a047{% else %}#e53935{% endif %}',
      confirmButtonText: 'Aceptar',
      timer: 4000,
      timerProgressBar: true
    });
    {% endfor %}
  {% endif %}
</script>

{% endblock %}
