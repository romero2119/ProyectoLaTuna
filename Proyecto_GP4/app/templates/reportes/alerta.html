<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sin datos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: rgba(0,0,0,0.1);
        }
        .alerta {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        .icono {
            font-size: 60px;
        }
        h2 {
            color: #e74c3c;
            margin: 15px 0 10px;
        }
        p {
            color: #555;
            margin-bottom: 25px;
        }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="alerta">
        <div class="icono">⚠️</div>
        <h2>¡Sin Datos!</h2>
        <p>No hay datos disponibles para generar el reporte.</p>
        <button onclick="window.history.back()">Regresar</button>
    </div>
</body>
</html>
